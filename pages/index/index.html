<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCare 智能康养演示</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- 使用 jsDelivr 的 Lucide 稳定链接 -->
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.460.0/dist/umd/lucide.min.js"></script>
    <style>
        @keyframes custom-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .animate-custom-bounce {
            animation: custom-bounce 1s infinite;
        }
        body {
            background-color: #f3f4f6;
        }
        .btn-press {
            transition: all 0.15s ease;
        }
        .btn-press:active {
            transform: scale(0.95);
        }
        @keyframes pulse-custom {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .animate-pulse-custom {
            animation: pulse-custom 1.5s infinite;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="min-h-screen flex flex-col items-center justify-center py-10 font-sans px-4">
            <div class="mb-6 flex flex-col items-center gap-3 w-full max-w-md">
                <div class="text-gray-500 text-sm flex items-center gap-2">
                    <i data-lucide="activity" class="w-4 h-4"></i> 提示：请在此切换产品演示视角
                </div>
                <div class="flex bg-gray-50 p-1 rounded-md border border-gray-200 shadow-inner">
                    <button @click="setRole('elderly')" 
                        :class="['px-4 py-2 rounded text-sm transition-all btn-press',
                            role === 'elderly' ? 'bg-[#fff5e6] text-[#d97706] font-bold' : 'text-gray-500']">
                        老人端
                    </button>
                    <button @click="setRole('family')" 
                        :class="['px-4 py-2 rounded text-sm transition-all btn-press',
                            role === 'family' ? 'bg-[#eff6ff] text-[#3b82f6] font-bold' : 'text-gray-500']">
                        家属端
                    </button>
                </div>
            </div>

            <!-- 移除手机外壳，直接显示内容卡片 -->
            <div class="w-full max-w-md bg-white rounded-3xl shadow-2xl overflow-hidden h-[700px] flex flex-col">
                <!-- 角色视图容器 -->
                <div class="flex-1 relative">
                    <!-- 老人端视图 -->
                    <div v-if="role === 'elderly'" class="absolute inset-0 flex flex-col bg-[#fdfaf4]">
                        <!-- 顶部状态栏 -->
                        <div class="bg-white px-5 pt-6 pb-4 shadow rounded-b-[24px] z-10 shrink-0">
                            <div class="flex justify-between items-center">
                                <div class="flex items-center gap-2 bg-[#f0fdf4] px-3 py-1.5 rounded-full border border-[#dcfce7]">
                                    <div class="w-2.5 h-2.5 bg-[#00b25e] rounded-full animate-pulse-custom"></div>
                                    <span class="text-[#166534] font-bold text-xs">已连接</span>
                                </div>
                                <div class="text-xs text-gray-500">{{ currentTime }}</div>
                            </div>
                        </div>

                        <!-- 功能按钮区域（可滚动） -->
                        <div class="flex-1 px-5 pt-4 overflow-y-auto space-y-4 pb-4">
                            <button class="w-full bg-[#ef4444] rounded-[24px] p-5 flex items-center text-white shadow-lg btn-press"
                                @click="showToast('紧急呼叫已发起，正在联系家属和120...')">
                                <div class="w-[60px] h-[60px] rounded-full border-2 border-white/30 flex items-center justify-center mr-4 bg-white/10">
                                    <i data-lucide="phone" class="w-[30px] h-[30px]"></i>
                                </div>
                                <div class="flex-1 text-left">
                                    <h2 class="text-3xl font-bold">紧急呼叫</h2>
                                    <p class="text-white/90 text-[15px]">呼叫子女 / 120</p>
                                </div>
                                <i data-lucide="chevron-right" class="w-8 h-8 text-white/80"></i>
                            </button>

                            <button class="w-full bg-[#10b981] rounded-[24px] p-5 flex items-center text-white shadow-lg btn-press"
                                @click="showToast('正在为您接入在线医生，请稍候...')">
                                <div class="w-[60px] h-[60px] rounded-full border-2 border-white/30 flex items-center justify-center mr-4 bg-white/10">
                                    <i data-lucide="stethoscope" class="w-[30px] h-[30px]"></i>
                                </div>
                                <div class="flex-1 text-left">
                                    <h2 class="text-3xl font-bold">看名医</h2>
                                    <p class="text-white/90 text-[15px]">AI面诊 / 测心率</p>
                                </div>
                                <i data-lucide="chevron-right" class="w-8 h-8 text-white/80"></i>
                            </button>

                            <button class="w-full bg-[#6366f1] rounded-[24px] p-5 flex items-center text-white shadow-lg btn-press"
                                @click="showToast('AI陪聊已开启，您可以开始对话了...')">
                                <div class="w-[60px] h-[60px] rounded-full border-2 border-white/30 flex items-center justify-center mr-4 bg-white/10">
                                    <i data-lucide="message-circle" class="w-[30px] h-[30px]"></i>
                                </div>
                                <div class="flex-1 text-left">
                                    <h2 class="text-3xl font-bold">AI 陪聊</h2>
                                    <p class="text-white/90 text-[15px]">讲笑话 / 读古诗</p>
                                </div>
                                <i data-lucide="chevron-right" class="w-8 h-8 text-white/80"></i>
                            </button>

                            <button class="w-full bg-[#f97316] rounded-[24px] p-5 flex items-center text-white shadow-lg btn-press"
                                @click="showToast('正在为您播放经典戏曲...')">
                                <div class="w-[60px] h-[60px] rounded-full border-2 border-white/30 flex items-center justify-center mr-4 bg-white/10">
                                    <i data-lucide="music" class="w-[30px] h-[30px]"></i>
                                </div>
                                <div class="flex-1 text-left">
                                    <h2 class="text-3xl font-bold">听广播</h2>
                                    <p class="text-white/90 text-[15px]">戏曲 / 广场舞</p>
                                </div>
                                <i data-lucide="chevron-right" class="w-8 h-8 text-white/80"></i>
                            </button>
                        </div>

                        <!-- 底部语音条（固定在底部） -->
                        <div class="bg-white rounded-t-[32px] pt-6 pb-6 px-6 shadow-inner shrink-0">
                            <div class="flex items-end gap-1.5 mb-3 h-8 justify-center">
                                <div v-for="(h, i) in [20,40,24,32,16]" 
                                    class="w-2.5 bg-[#3b82f6] rounded-full animate-custom-bounce"
                                    :style="{height:h+'px',animationDelay:i*0.1+'s'}"></div>
                            </div>
                            <p class="text-[#3b82f6] text-lg font-medium text-center">您可以直接说：“我想听戏”</p>
                        </div>
                    </div>

                    <!-- 家属端视图 -->
                    <div v-else class="absolute inset-0 flex flex-col bg-[#f4f6f9]">
                        <div class="bg-white px-5 pt-6 pb-4 flex justify-between items-center shadow-sm shrink-0">
                            <h1 class="text-[20px] font-bold">父母健康守护</h1>
                            <div class="text-xs text-gray-500">{{ currentTime }}</div>
                        </div>

                        <div class="flex-1 overflow-y-auto px-5 pt-5 pb-4 space-y-5">
                            <div class="bg-black rounded-2xl h-[180px] relative p-3 flex flex-col justify-between shadow-md">
                                <div class="flex justify-between z-10">
                                    <div class="bg-[#e43d33] text-white text-[10px] px-2 py-1 rounded font-bold animate-pulse-custom">
                                        LIVE
                                    </div>
                                    <div class="border border-[#10b981]/60 bg-[#10b981]/10 text-[#10b981] text-[10px] px-2 py-1 rounded">
                                        隐私模式
                                    </div>
                                </div>
                                <div class="text-white text-xs z-10">客厅摄像头 | 状态：{{ cameraStatus }}</div>
                            </div>

                            <div class="grid grid-cols-3 gap-3">
                                <div class="bg-white p-4 rounded-2xl flex flex-col items-center shadow-sm">
                                    <i data-lucide="heart" class="text-[#ef4444] w-[26px] h-[26px] animate-pulse-custom"></i>
                                    <div class="font-extrabold text-2xl">{{ heartRate }}</div>
                                    <div class="text-[11px] text-gray-400">bpm</div>
                                </div>
                                <div class="bg-white p-4 rounded-2xl flex flex-col items-center shadow-sm">
                                    <i data-lucide="wind" class="text-[#3b82f6] w-[26px] h-[26px]"></i>
                                    <div class="font-extrabold text-2xl">{{ breathRate }}</div>
                                    <div class="text-[11px] text-gray-400">次/分</div>
                                </div>
                                <div class="bg-white p-4 rounded-2xl flex flex-col items-center shadow-sm">
                                    <i data-lucide="thermometer" class="text-[#f97316] w-[26px] h-[26px]"></i>
                                    <div class="font-extrabold text-2xl">{{ temperature }}</div>
                                    <div class="text-[11px] text-gray-400">°C</div>
                                </div>
                            </div>

                            <div class="bg-white rounded-2xl p-5 shadow-sm btn-press"
                                @click="showToast('已为您生成详细的体质分析报告')">
                                <div class="flex justify-between items-center mb-3">
                                    <h3 class="font-bold text-lg">中医体质周报</h3>
                                    <span class="text-[11px] text-[#8b5cf6] bg-[#f3e8ff] px-2 py-1 rounded-full">AI 智能解读</span>
                                </div>
                                <div class="flex items-center gap-4">
                                    <div class="w-[72px] h-[72px] rounded-full bg-[#ecfdf5] flex items-center justify-center text-[#10b981] font-bold text-2xl border-4 border-[#a7f3d0] animate-pulse-custom">92</div>
                                    <div>
                                        <p class="text-gray-600">体质类型：平和质</p>
                                        <p class="text-[12px] text-gray-500">建议：今日气温较低，注意保暖。</p>
                                    </div>
                                </div>
                            </div>

                            <button class="w-full bg-[#ef4444]/10 border border-[#ef4444]/20 rounded-2xl p-4 flex items-center text-[#ef4444] btn-press"
                                @click="showToast('已向老人发送紧急提醒')">
                                <i data-lucide="alert-circle" class="w-6 h-6 mr-3"></i>
                                <span class="font-medium">紧急联系老人</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div v-if="toastVisible" class="fixed top-10 left-1/2 -translate-x-1/2 bg-black/80 text-white px-6 py-3 rounded-full z-50">
                {{ toastMessage }}
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, onMounted, onUnmounted, nextTick } = Vue;

        createApp({
            setup() {
                const role = ref('elderly');
                const toastVisible = ref(false);
                const toastMessage = ref('');
                const heartRate = ref(76);
                const breathRate = ref(18);
                const temperature = ref(36.5);
                const cameraStatus = ref('静坐阅读');
                const statusList = ['静坐阅读','慢走活动','饮水休息','观看电视','用餐中'];

                // 实时时间（ref）
                const currentTime = ref('');

                // 定时器ID
                let timeInterval;
                let healthInterval;

                // 更新时间函数
                const updateTime = () => {
                    currentTime.value = new Date().toLocaleTimeString('zh-CN', {
                        hour: '2-digit',
                        minute: '2-digit',
                        second: '2-digit', // 显示秒，体现实时性
                        hour12: false
                    });
                };

                const setRole = async (r) => {
                    role.value = r;
                    cameraStatus.value = statusList[Math.floor(Math.random() * statusList.length)];
                    // 等待 DOM 更新完成
                    await nextTick();
                    // 重新渲染图标
                    if (typeof lucide !== 'undefined') {
                        lucide.createIcons();
                    }
                };

                const showToast = (msg) => {
                    toastMessage.value = msg;
                    toastVisible.value = true;
                    setTimeout(() => toastVisible.value = false, 2000);
                };

                onMounted(() => {
                    // 初始化图标
                    if (typeof lucide !== 'undefined') {
                        lucide.createIcons();
                    } else {
                        console.error('Lucide 库未加载');
                    }

                    // 启动时间更新（每秒）
                    updateTime();
                    timeInterval = setInterval(updateTime, 1000);

                    // 健康数据模拟更新（每4秒）
                    healthInterval = setInterval(() => {
                        heartRate.value = 70 + Math.floor(Math.random() * 10);
                        breathRate.value = 16 + Math.floor(Math.random() * 4);
                        temperature.value = (36.2 + Math.random() * 0.6).toFixed(1);
                    }, 4000);
                });

                onUnmounted(() => {
                    // 清理定时器
                    if (timeInterval) clearInterval(timeInterval);
                    if (healthInterval) clearInterval(healthInterval);
                });

                return {
                    role,
                    setRole,
                    toastVisible,
                    toastMessage,
                    showToast,
                    heartRate,
                    breathRate,
                    temperature,
                    cameraStatus,
                    currentTime
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
